<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #FFFFFF;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      -webkit-app-region: drag;
      user-select: none;
      border: 1px solid #DADEE0;
      border-radius: 8px;
    }
    .logo {
      width: 64px;
      height: 64px;
      background: #1CA1C1;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .title {
      font-family: 'Segoe UI', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: #475466;
      margin-bottom: 24px;
    }
    .loader {
      display: flex;
      gap: 6px;
    }
    .loader span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #1CA1C1;
      animation: bounce 1.4s infinite ease-in-out both;
    }
    .loader span:nth-child(1) { animation-delay: -0.32s; }
    .loader span:nth-child(2) { animation-delay: -0.16s; }
    .loader span:nth-child(3) { animation-delay: 0s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.4); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }
    .status {
      font-family: 'Segoe UI', sans-serif;
      font-size: 12px;
      color: #94A1B3;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="logo">iS</div>
  <div class="title">inSCADA Chat</div>
  <div class="loader"><span></span><span></span><span></span></div>
  <div class="status">Sunucu başlatılıyor...</div>
</body>
</html>
