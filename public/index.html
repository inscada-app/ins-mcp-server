<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>inSCADA AI Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@400;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Electron Custom Title Bar -->
  <div id="titleBar" style="display:none;">
    <div class="tb-drag">
      <svg class="tb-logo" width="16" height="16" viewBox="0 0 28 28" fill="none">
        <rect width="28" height="28" rx="6" fill="#1CA1C1"/>
        <text x="14" y="19" text-anchor="middle" fill="#fff" font-size="14" font-weight="700" font-family="sans-serif">iS</text>
      </svg>
      <span class="tb-title">inSCADA Chat</span>
    </div>
    <div class="tb-menu">
      <button id="tbSettings" class="tb-menu-btn" title="Ayarlar">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
        </svg>
      </button>
      <button id="tbAbout" class="tb-menu-btn" title="Hakkında">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>
        </svg>
      </button>
    </div>
    <div class="tb-controls">
      <button id="tbMin" class="tb-btn" title="Minimize">
        <svg width="12" height="12" viewBox="0 0 12 12"><rect x="1" y="5.5" width="10" height="1" fill="currentColor"/></svg>
      </button>
      <button id="tbMax" class="tb-btn" title="Maximize">
        <svg width="12" height="12" viewBox="0 0 12 12"><rect x="1.5" y="1.5" width="9" height="9" rx="1" stroke="currentColor" stroke-width="1" fill="none"/></svg>
      </button>
      <button id="tbClose" class="tb-btn tb-close" title="Close">
        <svg width="12" height="12" viewBox="0 0 12 12"><path d="M2 2l8 8M10 2l-8 8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>

  <div id="app">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <rect width="28" height="28" rx="6" fill="#1CA1C1"/>
            <path d="M7 14h14M14 7v14M9 9l10 10M19 9L9 19" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <span>inSCADA AI</span>
        </div>
        <button id="newChatBtn" title="Yeni Sohbet">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M10 4v12M4 10h12" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div id="chatList" class="chat-list"></div>
      <div class="sidebar-footer">
        <div class="connection-status" id="statusIndicator">
          <span class="dot"></span>
          <span id="statusText">Bağlı</span>
        </div>
      </div>
    </aside>

    <!-- Main Chat Area -->
    <main id="chatArea">
      <!-- Header -->
      <header id="chatHeader">
        <button id="sidebarToggle" class="mobile-only">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M3 5h14M3 10h14M3 15h14" stroke-linecap="round"/>
          </svg>
        </button>
        <div class="header-title">
          <h1 id="chatTitle">Yeni Sohbet</h1>
          <span class="header-subtitle">PostgreSQL • InfluxDB • Charts</span>
        </div>
        <div class="header-actions">
          <button id="clearChatBtn" title="Sohbeti Temizle">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M3 5h12M7 5V3h4v2M5 5v10a1 1 0 001 1h6a1 1 0 001-1V5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </header>

      <!-- Messages -->
      <div id="messages" class="messages">
        <div class="welcome-message">
          <div class="welcome-icon">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
              <rect width="48" height="48" rx="12" fill="#1CA1C1" opacity="0.1"/>
              <path d="M14 24h20M24 14v20M17 17l14 14M31 17L17 31" stroke="#1CA1C1" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
          <h2>inSCADA AI Asistanı</h2>
          <p>SCADA projelerinizi yönetin, scriptleri düzenleyin, endüstriyel verileri analiz edin.</p>
          <div class="quick-actions">
            <button class="quick-btn" data-msg="Space'leri listele">📁 Space'leri Göster</button>
            <button class="quick-btn" data-msg="InfluxDB'deki measurement'ları listele">📊 Measurement'lar</button>
            <button class="quick-btn" data-msg="Son 24 saatte güncellenen scriptleri göster">📝 Son Scriptler</button>
            <button class="quick-btn" data-msg="Sistemin genel durumunu özetle">🔍 Sistem Durumu</button>
            <button class="quick-btn" data-msg="Projeleri listele">🏭 Projeler</button>
            <button class="quick-btn" data-msg="Veritabanından tüm projeleri bul ve aktif alarmları göster">🚨 Aktif Alarmlar</button>
            <button class="quick-btn" data-msg="Veritabanından tüm connection'ları çek ve bağlantı durumlarını kontrol et">🔗 Bağlantı Durumları</button>
            <button class="quick-btn" data-msg="Veritabanından projeleri ve değişkenleri listele, sonra ilk değişkenin canlı değerini oku">📡 Canlı Değer</button>
            <button class="quick-btn" data-msg="InfluxDB'den değişken isimlerini bul ve son 24 saatlik veriyi line chart olarak çiz">📈 Line Chart</button>
            <button class="quick-btn" data-msg="InfluxDB'den değişken isimlerini bul ve ortalamalarını bar chart ile karşılaştır">📊 Bar Chart</button>
            <button class="quick-btn" data-msg="InfluxDB'den bir değişken bul ve anlık değerini gauge olarak göster">🎯 Gauge</button>
            <button class="quick-btn" data-msg="InfluxDB'den bir değişken bul, son 24 saatlik veriyi analiz edip tahmin grafiği oluştur">🔮 Tahmin Grafiği</button>
          </div>
        </div>
      </div>

      <!-- Input Area -->
      <div id="inputArea" class="input-area">
        <div id="quickPanel" class="quick-panel" style="display:none;">
          <div class="quick-panel-actions">
            <button class="quick-btn" data-msg="Space'leri listele">📁 Space'leri Göster</button>
            <button class="quick-btn" data-msg="InfluxDB'deki measurement'ları listele">📊 Measurement'lar</button>
            <button class="quick-btn" data-msg="Son 24 saatte güncellenen scriptleri göster">📝 Son Scriptler</button>
            <button class="quick-btn" data-msg="Sistemin genel durumunu özetle">🔍 Sistem Durumu</button>
            <button class="quick-btn" data-msg="Projeleri listele">🏭 Projeler</button>
            <button class="quick-btn" data-msg="Veritabanından tüm projeleri bul ve aktif alarmları göster">🚨 Aktif Alarmlar</button>
            <button class="quick-btn" data-msg="Veritabanından tüm connection'ları çek ve bağlantı durumlarını kontrol et">🔗 Bağlantı Durumları</button>
            <button class="quick-btn" data-msg="Veritabanından projeleri ve değişkenleri listele, sonra ilk değişkenin canlı değerini oku">📡 Canlı Değer</button>
            <button class="quick-btn" data-msg="InfluxDB'den değişken isimlerini bul ve son 24 saatlik veriyi line chart olarak çiz">📈 Line Chart</button>
            <button class="quick-btn" data-msg="InfluxDB'den değişken isimlerini bul ve ortalamalarını bar chart ile karşılaştır">📊 Bar Chart</button>
            <button class="quick-btn" data-msg="InfluxDB'den bir değişken bul ve anlık değerini gauge olarak göster">🎯 Gauge</button>
            <button class="quick-btn" data-msg="InfluxDB'den bir değişken bul, son 24 saatlik veriyi analiz edip tahmin grafiği oluştur">🔮 Tahmin Grafiği</button>
          </div>
        </div>
        <div class="input-container">
          <button id="quickToggle" class="quick-toggle" title="Hızlı aksiyonlar">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
              <path d="M9 3v12M3 9h12"/>
            </svg>
          </button>
          <textarea id="messageInput" placeholder="Mesajınızı yazın... (Enter gönder, Shift+Enter yeni satır)" rows="1"></textarea>
          <button id="sendBtn" title="Gönder">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <path d="M3 10l14-7-4 7 4 7z" fill="currentColor"/>
            </svg>
          </button>
        </div>
        <div class="input-footer">
          <span class="powered-by">Claude Sonnet 4 • <span id="toolCount">0</span> tool</span>
          <span class="session-tokens" id="sessionTokens">0 token</span>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/sql.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/json.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
